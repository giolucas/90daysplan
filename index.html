<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plano 90 Dias</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f1117; }
  button { font-family: inherit; }
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const C = {
  bg:"#0f1117",card:"#1a1d27",border:"#2a2d3a",
  accent:"#f97316",aLight:"#fb923c",green:"#22c55e",
  blue:"#3b82f6",purple:"#a855f7",text:"#f1f5f9",
  muted:"#94a3b8",dim:"#64748b"
};

const weekMenu = [
  {day:"Segunda",meals:[
    {time:"07:00",name:"Café da manhã",items:["3 ovos mexidos","2 fatias de pão integral","1 banana","Café sem açúcar"]},
    {time:"10:00",name:"Lanche",items:["200g iogurte grego natural","1 col. whey protein (opcional)","Punhado de castanhas"]},
    {time:"13:00",name:"Almoço",items:["200g frango grelhado","150g arroz integral","Feijão (concha)","Salada verde à vontade + azeite"]},
    {time:"16:00",name:"Pré-treino",items:["1 banana","1 col. pasta de amendoim"]},
    {time:"20:00",name:"Jantar",items:["200g tilápia ou atum grelhado","Brócolis no vapor","2 batatas-doces médias"]},
  ]},
  {day:"Terça",meals:[
    {time:"07:00",name:"Café da manhã",items:["Omelete 3 ovos + queijo cottage","1 fatia pão integral","Laranja ou kiwi"]},
    {time:"10:00",name:"Lanche",items:["Mix de oleaginosas (30g)","1 maçã"]},
    {time:"13:00",name:"Almoço",items:["200g carne vermelha magra (patinho)","Purê de mandioca (porção)","Salada de tomate e cebola"]},
    {time:"16:00",name:"Lanche",items:["200ml leite + cacau em pó","2 torradas integrais"]},
    {time:"20:00",name:"Jantar",items:["200g peito de frango","Quinoa (150g cozido)","Espinafre refogado"]},
  ]},
  {day:"Quarta",meals:[
    {time:"07:00",name:"Café da manhã",items:["Vitamina: whey + aveia + leite + banana","1 fatia pão integral com ovo cozido"]},
    {time:"10:00",name:"Lanche",items:["Iogurte grego + granola sem açúcar (30g)","1 tangerina"]},
    {time:"13:00",name:"Almoço",items:["200g salmão grelhado","Arroz integral (150g)","Aspargos ou abobrinha grelhada"]},
    {time:"16:00",name:"Pré-treino",items:["1 banana + 1 tâmara","Café pré-treino ou água com limão"]},
    {time:"20:00",name:"Jantar",items:["Omelete 4 claras + 1 gema","Salada de folhas com atum","1 fatia pão integral"]},
  ]},
  {day:"Quinta",meals:[
    {time:"07:00",name:"Café da manhã",items:["3 ovos + aveia (50g) + mel","Chá verde ou café"]},
    {time:"10:00",name:"Lanche",items:["Queijo cottage (100g)","Cenoura baby ou pepino"]},
    {time:"13:00",name:"Almoço",items:["200g frango desfiado","Macarrão integral (100g seco)","Molho de tomate caseiro","Salada"]},
    {time:"16:00",name:"Lanche",items:["Whey protein com água ou leite","1 fruta"]},
    {time:"20:00",name:"Jantar",items:["200g peixe branco assado","Legumes assados (cenoura, chuchu, cebola)","1 batata-doce"]},
  ]},
  {day:"Sexta",meals:[
    {time:"07:00",name:"Café da manhã",items:["Tapioca 2 unid. + frango desfiado + queijo","Café sem açúcar","1 fruta"]},
    {time:"10:00",name:"Lanche",items:["Iogurte grego + 1 col. mel + frutas vermelhas"]},
    {time:"13:00",name:"Almoço",items:["200g carne moída refogada","Arroz + feijão","Couve refogada"]},
    {time:"16:00",name:"Pré-treino",items:["1 banana + café ou chá"]},
    {time:"20:00",name:"Jantar",items:["200g frango grelhado","Salada grande com azeite e limão","1 batata-doce"]},
  ]},
  {day:"Sábado",meals:[
    {time:"08:00",name:"Café da manhã",items:["Omelete caprichado (4 ovos, tomate, cebola)","2 fatias pão integral","Suco de laranja natural (200ml)"]},
    {time:"11:00",name:"Lanche",items:["Mix de frutas com granola","Iogurte grego"]},
    {time:"13:30",name:"Almoço livre",items:["⭐ Refeição livre controlada","Ex: churrasco + salada","Evite bebida alcoólica em excesso"]},
    {time:"19:00",name:"Jantar leve",items:["Sopa de legumes com frango","1 fatia pão integral"]},
  ]},
  {day:"Domingo",meals:[
    {time:"08:00",name:"Café da manhã",items:["Panqueca de aveia + banana + ovo (2 unid)","Café com leite"]},
    {time:"12:30",name:"Almoço em família",items:["Proteína magra à escolha","Arroz, feijão, salada","Uma sobremesa pequena ok"]},
    {time:"19:00",name:"Jantar",items:["Omelete simples ou sanduíche de atum","Suco de maracujá sem açúcar"]},
  ]},
];

const workouts = [
  {day:"Segunda",label:"PEITO + TRÍCEPS",color:C.accent,exercises:[
    {name:"Supino reto com barra",sets:"4x10-12",rest:"90s",tip:"Escápulas retraídas, barra desce no esterno"},
    {name:"Supino inclinado com halteres",sets:"3x12",rest:"75s",tip:"Ângulo 30-45°, foco na parte superior"},
    {name:"Crucifixo na máquina (peck deck)",sets:"3x15",rest:"60s",tip:"Controle o movimento de volta"},
    {name:"Tríceps pulley corda",sets:"4x12",rest:"60s",tip:"Cotovelo fixo ao lado do corpo"},
    {name:"Tríceps testa com barra",sets:"3x12",rest:"75s",tip:"Não abra os cotovelos"},
    {name:"Mergulho no banco",sets:"3x falha",rest:"60s",tip:"Pernas esticadas para intensificar"},
  ]},
  {day:"Terça",label:"COSTAS + BÍCEPS",color:C.blue,exercises:[
    {name:"Puxada frontal aberta",sets:"4x10-12",rest:"90s",tip:"Puxe com o cotovelo, não com a mão"},
    {name:"Remada curvada com barra",sets:"4x10",rest:"90s",tip:"Coluna neutra, core ativado"},
    {name:"Remada unilateral com haltere",sets:"3x12",rest:"75s",tip:"Apoio no banco, rotação do torso"},
    {name:"Pullover na polia",sets:"3x15",rest:"60s",tip:"Sente o alongamento do grande dorsal"},
    {name:"Rosca direta com barra",sets:"4x12",rest:"60s",tip:"Sem embalar o corpo"},
    {name:"Rosca martelo com haltere",sets:"3x12",rest:"60s",tip:"Cotovelo fixo, foco no braquial"},
  ]},
  {day:"Quarta",label:"PERNAS (FOCO QUADRÍCEPS)",color:C.green,exercises:[
    {name:"Agachamento livre",sets:"4x10-12",rest:"120s",tip:"Desça até 90°+, joelhos alinhados"},
    {name:"Leg press 45°",sets:"4x12-15",rest:"90s",tip:"Pés na largura dos ombros"},
    {name:"Cadeira extensora",sets:"3x15",rest:"60s",tip:"Isometria de 1s no topo"},
    {name:"Hack squat ou afundo",sets:"3x12 cada",rest:"75s",tip:"Passada longa, joelho não passa a ponta do pé"},
    {name:"Panturrilha em pé (máquina)",sets:"4x20",rest:"45s",tip:"Amplitude completa, pause no fundo"},
  ]},
  {day:"Quinta",label:"OMBRO + ABDÔMEN",color:C.purple,exercises:[
    {name:"Desenvolvimento com halteres",sets:"4x10-12",rest:"90s",tip:"Cuidado com a lombar, core firme"},
    {name:"Elevação lateral",sets:"4x15",rest:"60s",tip:"Leve inclinação para frente, cotovelo levemente flexionado"},
    {name:"Elevação frontal alternada",sets:"3x12",rest:"60s",tip:"Até a altura dos ombros"},
    {name:"Encolhimento com halteres",sets:"3x15",rest:"60s",tip:"Pausa no topo"},
    {name:"Prancha abdominal",sets:"4x45s",rest:"30s",tip:"Core contraído, não levante o quadril"},
    {name:"Crunch bicicleta",sets:"3x20",rest:"30s",tip:"Cotovelo toca o joelho oposto"},
    {name:"Abdominal infra (elevação de pernas)",sets:"3x15",rest:"45s",tip:"Lombar colada no chão"},
  ]},
  {day:"Sexta",label:"PERNAS (FOCO POSTERIOR + GLÚTEO)",color:"#10b981",exercises:[
    {name:"Stiff com barra",sets:"4x12",rest:"90s",tip:"Coluna neutra, sente o alongamento do isquio"},
    {name:"Cadeira flexora",sets:"4x12-15",rest:"75s",tip:"Não solte rápido na volta"},
    {name:"Mesa flexora",sets:"3x12",rest:"75s",tip:"Alternativa à cadeira"},
    {name:"Agachamento sumô com haltere",sets:"3x15",rest:"75s",tip:"Pés bem abertos, foco no glúteo"},
    {name:"Elevação pélvica (hip thrust)",sets:"4x15",rest:"75s",tip:"Isometria de 2s no topo"},
    {name:"Panturrilha sentado (máquina)",sets:"3x20",rest:"45s",tip:"Foco no sóleo"},
  ]},
  {day:"Sábado",label:"CARDIO + MOBILIDADE",color:"#f59e0b",exercises:[
    {name:"Esteira — caminhada rápida ou corrida leve",sets:"30-40 min",rest:"—",tip:"Zona de queima de gordura: 65-75% FC máx (~118-135 bpm)"},
    {name:"Elíptico ou bicicleta ergométrica",sets:"20 min (opcional)",rest:"—",tip:"Bom para recuperação ativa"},
    {name:"Alongamento geral + foam roller",sets:"15 min",rest:"—",tip:"Foco em quadríceps, isquio, panturrilha, lombar"},
  ]},
  {day:"Domingo",label:"DESCANSO ATIVO",color:C.dim,exercises:[
    {name:"Caminhada leve 30 min (opcional)",sets:"—",rest:"—",tip:"Ao ar livre de preferência"},
    {name:"Alongamento e respiração",sets:"15 min",rest:"—",tip:"Yoga, pilates leve ou simples alongamento"},
  ]},
];

const tips = [
  {icon:"💧",title:"Hidratação",text:"3–3,5 litros de água/dia. Essencial para metabolismo e performance."},
  {icon:"😴",title:"Sono",text:"7–9h de sono. É onde acontece 70% da recuperação muscular e regulação do cortisol (o hormônio da barriga)."},
  {icon:"⏱️",title:"Progressão",text:"Aumente carga ou repetições a cada 2 semanas. Sem progressão = sem resultado."},
  {icon:"🧬",title:"Proteína",text:"Alvo mínimo: 160–175g/dia. Para você (100kg), isso é crucial para preservar músculo enquanto perde gordura."},
  {icon:"🚫",title:"Evite",text:"Açúcar refinado, ultra-processados, álcool em excesso e jejum extremo (corta músculo e aumenta cortisol)."},
  {icon:"📊",title:"Progresso",text:"Meça cintura toda semana, peso na sexta de manhã em jejum. Tire foto do espelho a cada 4 semanas."},
];

const SK = "plano90_progress";
const load = () => { try { const r=localStorage.getItem(SK); return r?JSON.parse(r):{}; } catch{return{};} };
const save = d => { try{localStorage.setItem(SK,JSON.stringify(d));}catch{} };

const exK = (d,i) => `ex_${d}_${i}`;
const dayK = d => `day_${d}`;

function App() {
  const [tab, setTab] = React.useState("cardapio");
  const [day, setDay] = React.useState(0);
  const [exMeal, setExMeal] = React.useState(null);
  const [exEx, setExEx] = React.useState(null);
  const [prog, setProg] = React.useState(load);
  const [toast, setToast] = React.useState(false);

  const labels = ["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"];
  const menu = weekMenu[day];
  const wk = workouts[day];

  const exDone = (d,i) => !!prog[exK(d,i)];
  const dayDone = d => !!prog[dayK(d)];
  const done = d => workouts[d].exercises.filter((_,i)=>exDone(d,i)).length;
  const total = d => workouts[d].exercises.length;
  const weekDone = labels.filter((_,i)=>dayDone(i)).length;

  const celebrate = () => { setToast(true); setTimeout(()=>setToast(false),2500); };

  const toggleEx = (d,i) => {
    const k=exK(d,i);
    const n={...prog,[k]:!prog[k]};
    const allDone=workouts[d].exercises.every((_,j)=>j===i?!prog[k]:!!n[exK(d,j)]);
    if(allDone&&!n[dayK(d)]){n[dayK(d)]=true;celebrate();}
    setProg(n);save(n);
  };

  const toggleDay = d => {
    const dn=dayDone(d);
    const n={...prog,[dayK(d)]:!dn};
    workouts[d].exercises.forEach((_,i)=>{n[exK(d,i)]=!dn;});
    if(!dn)celebrate();
    setProg(n);save(n);
  };

  const s = (obj) => Object.assign({},obj);

  return (
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Segoe UI',system-ui,sans-serif",maxWidth:480,margin:"0 auto",paddingBottom:80,position:"relative"}}>

      {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:C.green,color:"#fff",borderRadius:12,padding:"10px 20px",fontWeight:700,fontSize:14,zIndex:999,boxShadow:"0 4px 20px rgba(34,197,94,0.4)",whiteSpace:"nowrap"}}>🎉 Treino concluído! Mandou bem!</div>}

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#1a1d27 0%,#0f1117 100%)",borderBottom:`1px solid ${C.border}`,padding:"20px 16px 16px",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
          <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${C.accent},${C.aLight})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🏋️</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:16}}>Plano 90 Dias</div>
            <div style={{color:C.muted,fontSize:11}}>41 anos · 100kg · 1,95m · Recomposição Corporal</div>
          </div>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"4px 10px",textAlign:"center"}}>
            <div style={{color:C.accent,fontWeight:800,fontSize:15}}>{weekDone}<span style={{fontSize:11,color:C.dim}}>/7</span></div>
            <div style={{color:C.dim,fontSize:9}}>esta semana</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginTop:12}}>
          {[{l:"Calorias",v:"2.100",u:"kcal",c:C.accent},{l:"Proteína",v:"175",u:"g",c:C.green},{l:"Carbs",v:"200",u:"g",c:C.blue},{l:"Gordura",v:"65",u:"g",c:C.purple}].map(m=>(
            <div key={m.l} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 8px",textAlign:"center"}}>
              <div style={{color:m.c,fontWeight:700,fontSize:14}}>{m.v}<span style={{fontSize:9,color:C.muted}}>{m.u}</span></div>
              <div style={{color:C.dim,fontSize:10}}>{m.l}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",background:C.card,margin:"12px 16px",borderRadius:10,border:`1px solid ${C.border}`,overflow:"hidden"}}>
        {[{k:"cardapio",l:"🥗 Cardápio"},{k:"treino",l:"💪 Treino"},{k:"dicas",l:"⭐ Dicas"}].map(t=>(
          <button key={t.k} onClick={()=>setTab(t.k)} style={{flex:1,padding:"10px 6px",background:tab===t.k?C.accent:"transparent",color:tab===t.k?"#fff":C.muted,border:"none",cursor:"pointer",fontWeight:tab===t.k?700:400,fontSize:12}}>
            {t.l}
          </button>
        ))}
      </div>

      {/* Day selector */}
      {(tab==="cardapio"||tab==="treino")&&(
        <div style={{display:"flex",gap:6,padding:"0 16px 12px",overflowX:"auto",scrollbarWidth:"none"}}>
          {labels.map((d,i)=>{
            const dn=dayDone(i), pt=!dn&&done(i)>0;
            return(
              <button key={d} onClick={()=>{setDay(i);setExMeal(null);setExEx(null);}} style={{flexShrink:0,padding:"6px 12px",borderRadius:20,border:`1px solid ${day===i?C.accent:dn?C.green:pt?C.accent+"88":C.border}`,background:day===i?C.accent:dn?C.green+"22":C.card,color:day===i?"#fff":dn?C.green:C.muted,fontSize:12,fontWeight:600,cursor:"pointer",position:"relative"}}>
                {dn&&<span style={{fontSize:8,marginRight:3}}>✓</span>}{d}
                {pt&&<span style={{position:"absolute",top:2,right:2,width:6,height:6,borderRadius:"50%",background:C.accent}}/>}
              </button>
            );
          })}
        </div>
      )}

      {/* CARDÁPIO */}
      {tab==="cardapio"&&(
        <div style={{padding:"0 16px"}}>
          <div style={{fontSize:13,fontWeight:700,color:C.muted,marginBottom:10,textTransform:"uppercase",letterSpacing:1}}>{menu.day} — {menu.meals.length} refeições</div>
          {menu.meals.map((meal,i)=>(
            <div key={i} onClick={()=>setExMeal(exMeal===i?null:i)} style={{background:C.card,border:`1px solid ${exMeal===i?C.accent:C.border}`,borderRadius:12,marginBottom:8,overflow:"hidden",cursor:"pointer"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{background:exMeal===i?C.accent:"#2a2d3a",borderRadius:6,padding:"3px 7px",fontSize:11,fontWeight:600,color:exMeal===i?"#fff":C.dim}}>{meal.time}</div>
                  <div style={{fontWeight:600,fontSize:14}}>{meal.name}</div>
                </div>
                <div style={{color:C.dim}}>{exMeal===i?"▲":"▼"}</div>
              </div>
              {exMeal===i&&(
                <div style={{padding:"0 14px 12px",borderTop:`1px solid ${C.border}`}}>
                  {meal.items.map((item,j)=>(
                    <div key={j} style={{display:"flex",gap:8,padding:"6px 0",borderBottom:j<meal.items.length-1?`1px solid ${C.border}`:"none"}}>
                      <span style={{color:C.accent,fontSize:12,marginTop:2}}>●</span>
                      <span style={{fontSize:13}}>{item}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          ))}
          {day===5&&(
            <div style={{background:"#1a1d27",border:`1px solid ${C.accent}44`,borderRadius:10,padding:12}}>
              <div style={{color:C.accent,fontWeight:700,fontSize:12,marginBottom:4}}>⭐ REFEED SEMANAL</div>
              <div style={{color:C.muted,fontSize:12,lineHeight:1.6}}>Sábado é seu dia de maior flexibilidade. Uma refeição livre ajuda na adesão e pode auxiliar na regulação hormonal (leptina). Não precisa ser perfeito, mas evite exageros.</div>
            </div>
          )}
        </div>
      )}

      {/* TREINO */}
      {tab==="treino"&&(
        <div style={{padding:"0 16px"}}>
          <div style={{background:C.card,border:`1px solid ${wk.color}55`,borderRadius:12,padding:"12px 14px",marginBottom:12,borderLeft:`3px solid ${wk.color}`}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <div>
                <div style={{color:wk.color,fontWeight:800,fontSize:15}}>{wk.label}</div>
                <div style={{color:C.muted,fontSize:12,marginTop:2}}>{wk.exercises.length} exercícios · SmartFit</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <div style={{background:dayDone(day)?C.green+"22":C.card,border:`1.5px solid ${dayDone(day)?C.green:wk.color}`,borderRadius:10,padding:"4px 12px",minWidth:56,textAlign:"center"}}>
                  <span style={{color:dayDone(day)?C.green:wk.color,fontWeight:800,fontSize:18}}>{done(day)}</span>
                  <span style={{color:C.dim,fontSize:14}}>/{total(day)}</span>
                </div>
                <div style={{color:C.dim,fontSize:10}}>exercícios</div>
              </div>
            </div>
            <div style={{background:"#2a2d3a",borderRadius:6,height:6,overflow:"hidden",marginBottom:10}}>
              <div style={{background:dayDone(day)?C.green:wk.color,height:"100%",borderRadius:6,width:`${(done(day)/total(day))*100}%`,transition:"width 0.3s ease"}}/>
            </div>
            <button onClick={()=>toggleDay(day)} style={{width:"100%",padding:"8px",borderRadius:8,border:`1.5px solid ${dayDone(day)?C.green:wk.color}`,background:dayDone(day)?C.green+"22":"transparent",color:dayDone(day)?C.green:wk.color,fontWeight:700,fontSize:13,cursor:"pointer"}}>
              {dayDone(day)?"✓ Treino concluído — desfazer":"Marcar treino como concluído"}
            </button>
          </div>

          {wk.exercises.map((ex,i)=>{
            const dn=exDone(day,i);
            return(
              <div key={i} style={{background:C.card,border:`1px solid ${exEx===i?wk.color:dn?C.green+"55":C.border}`,borderRadius:10,marginBottom:8,overflow:"hidden"}}>
                <div style={{display:"flex",alignItems:"center",padding:"11px 14px",gap:10}}>
                  <div onClick={e=>{e.stopPropagation();toggleEx(day,i);}} style={{flexShrink:0,width:24,height:24,borderRadius:6,border:`2px solid ${dn?C.green:C.dim}`,background:dn?C.green:"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all 0.15s"}}>
                    {dn&&<span style={{color:"#fff",fontSize:13,lineHeight:1}}>✓</span>}
                  </div>
                  <div style={{flex:1}} onClick={()=>setExEx(exEx===i?null:i)}>
                    <div style={{fontWeight:600,fontSize:13,color:dn?C.dim:C.text,textDecoration:dn?"line-through":"none"}}>{ex.name}</div>
                    <div style={{display:"flex",gap:8,marginTop:4}}>
                      <span style={{background:`${wk.color}22`,color:wk.color,borderRadius:5,padding:"2px 7px",fontSize:11,fontWeight:600}}>{ex.sets}</span>
                      {ex.rest!=="—"&&<span style={{background:"#2a2d3a",color:C.dim,borderRadius:5,padding:"2px 7px",fontSize:11}}>⏱ {ex.rest}</span>}
                    </div>
                  </div>
                  <div onClick={()=>setExEx(exEx===i?null:i)} style={{color:C.dim,cursor:"pointer"}}>💡</div>
                </div>
                {exEx===i&&(
                  <div style={{padding:"8px 14px 12px",borderTop:`1px solid ${C.border}`,color:C.muted,fontSize:12,lineHeight:1.6}}>
                    <span style={{color:wk.color}}>Dica: </span>{ex.tip}
                  </div>
                )}
              </div>
            );
          })}

          {day<5&&(
            <div style={{background:"#1a1d27",border:`1px solid ${C.border}`,borderRadius:10,padding:12,marginTop:4}}>
              <div style={{color:C.muted,fontSize:12,lineHeight:1.6}}>🔥 <strong style={{color:C.text}}>Aquecimento:</strong> 5 min de elíptico + 2 séries leves (50% da carga) de cada exercício principal antes de começar.</div>
            </div>
          )}
        </div>
      )}

      {/* DICAS */}
      {tab==="dicas"&&(
        <div style={{padding:"0 16px"}}>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px",marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>📅 Semana atual</div>
            <div style={{display:"flex",gap:6,justifyContent:"space-between"}}>
              {labels.map((d,i)=>{
                const dn=dayDone(i),pt=!dn&&done(i)>0;
                return(
                  <div key={d} style={{flex:1,textAlign:"center"}}>
                    <div style={{width:"100%",aspectRatio:"1",borderRadius:6,background:dn?C.green+"33":pt?C.accent+"22":"#2a2d3a",border:`1.5px solid ${dn?C.green:pt?C.accent+"88":C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,marginBottom:4}}>
                      {dn?<span style={{color:C.green}}>✓</span>:pt?<span style={{color:C.accent,fontSize:10}}>{done(i)}/{total(i)}</span>:<span style={{color:C.dim,fontSize:10}}>—</span>}
                    </div>
                    <div style={{fontSize:9,color:C.dim}}>{d}</div>
                  </div>
                );
              })}
            </div>
            <div style={{marginTop:10,background:"#2a2d3a",borderRadius:6,height:6,overflow:"hidden"}}>
              <div style={{background:C.green,height:"100%",borderRadius:6,width:`${(weekDone/7)*100}%`,transition:"width 0.3s"}}/>
            </div>
            <div style={{color:C.muted,fontSize:11,marginTop:6}}>{weekDone} de 7 dias concluídos esta semana</div>
          </div>

          <div style={{background:`linear-gradient(135deg,${C.accent}22,${C.purple}11)`,border:`1px solid ${C.accent}44`,borderRadius:14,padding:16,marginBottom:14}}>
            <div style={{fontWeight:800,fontSize:16,marginBottom:6}}>🎯 Seu Objetivo</div>
            <div style={{color:C.muted,fontSize:13,lineHeight:1.7}}><strong style={{color:C.text}}>Déficit calórico moderado</strong> (~500 kcal/dia abaixo do gasto). Com treino de força + cardio estratégico, você pode perder <strong style={{color:C.accent}}>~1kg de gordura/semana</strong> enquanto preserva ou ganha músculo.</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:12}}>
              {[{l:"Meta 90 dias",v:"−8 a −12kg gordura"},{l:"Frequência",v:"5x/semana musculação"},{l:"Cardio",v:"2–3x/semana"},{l:"Revisão",v:"A cada 4 semanas"}].map(s=>(
                <div key={s.l} style={{background:C.card,borderRadius:8,padding:"8px 10px",border:`1px solid ${C.border}`}}>
                  <div style={{color:C.dim,fontSize:10}}>{s.l}</div>
                  <div style={{fontWeight:700,fontSize:12,marginTop:2}}>{s.v}</div>
                </div>
              ))}
            </div>
          </div>

          {tips.map((tip,i)=>(
            <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:8,display:"flex",gap:12,alignItems:"flex-start"}}>
              <div style={{fontSize:22,flexShrink:0}}>{tip.icon}</div>
              <div>
                <div style={{fontWeight:700,fontSize:13,marginBottom:4}}>{tip.title}</div>
                <div style={{color:C.muted,fontSize:12,lineHeight:1.6}}>{tip.text}</div>
              </div>
            </div>
          ))}

          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14,marginTop:4}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:8,color:C.accent}}>⚠️ Consulte um profissional</div>
            <div style={{color:C.muted,fontSize:12,lineHeight:1.6}}>Este plano é um guia geral. Para resultados seguros e personalizados, consulte um <strong style={{color:C.text}}>nutrólogo ou nutricionista</strong> e um <strong style={{color:C.text}}>educador físico</strong>. Exames de sangue periódicos (a cada 6 meses) são recomendados.</div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
